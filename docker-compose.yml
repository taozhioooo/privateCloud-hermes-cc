# =============================================================================
# Hermes Enterprise Platform — Docker Compose
# =============================================================================
#
# 每员工 2 个容器，各 100 个端口:
#
#   Hermes 容器:  10N01-10N99 (N=序号 01~70)
#     10N01 = SSH (用户主入口)
#     10N02-10N99 = Web 服务端口 (99个)
#
#   Claude 容器:  11N01-11N99
#     11N01 = SSH (用户直连 / Hermes 调用)
#     11N02-11N99 = Web 服务端口 (99个)
#
# 示例 (序号 01 = zhangsan):
#   Hermes:  10001=SSH  10002-10099=Web
#   Claude:  11001=SSH  11002-11099=Web
#
#   ssh hermes@服务器 -p 10001
#   ssh claude@服务器 -p 11001
#
# =============================================================================

services:
  redis:
    image: redis:7-alpine
    container_name: hermes-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - hermes-net

  # ═══════════════════════════════════════════════════════════════
  #  员工 01: zhangsan
  #  Hermes: 10001=SSH, 10002-10099=Web
  #  Claude: 11001=SSH, 11002-11099=Web
  # ═══════════════════════════════════════════════════════════════

  hermes-zhangsan:
    image: registry.cn-chengdu.aliyuncs.com/gmsoft_hub/hermes-agent:enterprise-20260508
    container_name: hermes-zhangsan
    restart: unless-stopped
    hostname: hermes-zhangsan
    environment:
      # LLM Provider API Keys
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - CUSTOM_API_KEY=${CUSTOM_API_KEY:-}
      # 网络搜索
      - BRAVE_API_KEY=${BRAVE_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      # 钉钉
      - DINGTALK_APP_KEY=${DINGTALK_APP_KEY:-}
      - DINGTALK_APP_SECRET=${DINGTALK_APP_SECRET:-}
      # 员工身份
      - EMPLOYEE_NAME=zhangsan
      - EMPLOYEE_SEQ=01
      - DOMAIN=engineering
      - ROLE=senior-engineer
      # 端口信息
      - SSH_PORT=10001
      - WEB_PORT_START=10002
      - WEB_PORT_END=10099
      - CLAUDE_HOST=claude-zhangsan
      - CLAUDE_SSH_PORT=11001
      # SSH
      - HERMES_SSH_PASS=hermes
      - HERMES_MODE=gateway
    ports:
      - "10001-10099:10001-10099"
    volumes:
      - zhangsan_hermes:/home/hermes/.hermes
      - zhangsan_workspace:/home/hermes/workspace
      - zhangsan_ssh_pub:/home/hermes/.ssh-pub
      - ./skills/L1:/opt/skills/L1:ro
      - ./skills/L2:/opt/skills/L2:ro
      - ./skills/L3:/opt/skills/L3:ro
    networks:
      - hermes-net
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
    security_opt:
      - no-new-privileges:true

  claude-zhangsan:
    image: registry.cn-chengdu.aliyuncs.com/gmsoft_hub/claude-code:enterprise-20260508
    container_name: claude-zhangsan
    restart: unless-stopped
    hostname: claude-zhangsan
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_SSH_PASS=claude
      - EMPLOYEE_NAME=zhangsan
      - EMPLOYEE_SEQ=01
      - SSH_PORT=11001
      - WEB_PORT_START=11002
      - WEB_PORT_END=11099
      - HERMES_HOST=hermes-zhangsan
    ports:
      - "11001-11099:11001-11099"
    volumes:
      - zhangsan_workspace:/home/claude/workspace
      - zhangsan_ssh_pub:/hermes-ssh-pub:ro
    networks:
      - hermes-net
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4G
    security_opt:
      - no-new-privileges:true

  # 默认仅预置 1 名员工
  # 其余员工请使用脚本追加到本文件
  #   ./scripts/provision_employee.sh <用户名> <域> <角色> <序号(01-70)> [SSH公钥或公钥文件路径]

networks:
  hermes-net:
    driver: bridge

volumes:
  redis_data:
  zhangsan_hermes:
  zhangsan_workspace:
  zhangsan_ssh_pub:
