# =============================================================================
# Hermes Agent 默认配置模板
# 实际运行时由 entrypoint.sh 根据 company-providers.yaml 自动生成
# 用户可通过 hermes model 或 hermes config edit 修改
# =============================================================================

# model 字段由 entrypoint.sh 自动填充
# 格式: provider/model-name
# 示例: deepseek/deepseek-chat, anthropic/claude-sonnet-4-6
model: ""

agent:
  max_turns: 90
  tool_use_enforcement: auto

terminal:
  cwd: /home/hermes/workspace
  timeout: 180

compression:
  enabled: true
  threshold: 0.50
  target_ratio: 0.20

display:
  show_reasoning: false
  show_cost: true

memory:
  memory_enabled: true
  user_profile_enabled: true

coding_agents:
  claude_code:
    remote_exec: ssh
    max_budget_usd: 5.0
    max_turns: 30
    allowed_tools: [Read, Write, Edit, Bash, WebSearch, WebFetch]

skills:
  external_dirs:
    - /opt/skills/L1
    - /opt/skills/L2
    - /opt/skills/L3

platforms:
  dingtalk:
    enabled: false
    display:
      streaming: true
      show_reasoning: false
    group_sessions_per_user: true

delegation:
  max_iterations: 50
  max_spawn_depth: 2

security:
  redact_secrets: true

approvals:
  mode: smart
